name: Playwright Scheduled Tests
 
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 60
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
 
      - name: Run Playwright tests
        run: npm run test-ci
 
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
 
      - name: Send Teams notification on success
        if: success()
        uses: skitionek/notify-microsoft-teams@master
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          raw: >
            {
              "@type": "MessageCard",
              "@context": "http://schema.org/extensions",
              "themeColor": "00FF00",
              "summary": "Playwright Tests Passed",
              "sections": [{
                "activityTitle": "✅ Playwright Tests Passed!",
                "activitySubtitle": "All tests completed successfully",
                "facts": [
                  { "name": "Repository", "value": "${{ github.repository }}" },
                  { "name": "Workflow", "value": "${{ github.workflow }}" },
                  { "name": "Triggered by", "value": "${{ github.actor }}" },
                  { "name": "Branch", "value": "${{ github.ref_name }}" }
                ],
                "potentialAction": [{
                  "@type": "OpenUri",
                  "name": "View Run",
                  "targets": [{ "os": "default", "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }]
                }]
              }]
            }
 
      - name: Send Teams notification on failure
        if: failure()
        uses: skitionek/notify-microsoft-teams@master
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          raw: >
            {
              "@type": "MessageCard",
              "@context": "http://schema.org/extensions",
              "themeColor": "FF0000",
              "summary": "Playwright Tests Failed",
              "sections": [{
                "activityTitle": "❌ Playwright Tests Failed!",
                "activitySubtitle": "One or more tests failed — immediate attention required",
                "facts": [
                  { "name": "Repository", "value": "${{ github.repository }}" },
                  { "name": "Workflow", "value": "${{ github.workflow }}" },
                  { "name": "Triggered by", "value": "${{ github.actor }}" },
                  { "name": "Branch", "value": "${{ github.ref_name }}" }
                ],
                "potentialAction": [{
                  "@type": "OpenUri",
                  "name": "View Failed Run",
                  "targets": [{ "os": "default", "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }]
                }]
              }]
            }